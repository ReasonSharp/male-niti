user                              nginx;
worker_processes                  1;

error_log                         /var/log/nginx/error.log warn;
pid                               /var/run/nginx.pid;

events {
 worker_connections               1024;
}

stream {
 upstream nakeddiaries {
  server                          127.0.0.1:8443;
 }
 upstream blog {
  server                          127.0.0.1:8444;
 }
 upstream ln {
  server                          127.0.0.1:8445;
 }
 upstream web {
  server                          127.0.0.1:8446;
 }
 upstream dnh {
  server                          127.0.0.1:8447;
 }
 upstream back {
  server                          127.0.0.1:8448;
 }
 map $ssl_preread_server_name $upstream {
  *.relay.maleniti.com            back;
  relay.maleniti.com              back;
  nakeddiaries.maleniti.com       nakeddiaries;
  blog.maleniti.com               blog;
  ln.maleniti.com                 ln;
  dnh.hr                          dnh;
  www.dnh.hr                      dnh;
  *.dnh.hr                        dnh;
  default                         web;
 }
 server {
  listen                          443;
  resolver                        1.1.1.1;
  proxy_connect_timeout           1s;
  proxy_timeout                   3s;
  proxy_pass                      $upstream;
  ssl_preread                     on;
  proxy_protocol                  on;
 }
 server {
  listen                          8448 proxy_protocol;
  proxy_pass                      161.97.149.206:443;
 }
}
http {
 include                          /etc/nginx/mime.types;
 default_type                     application/octet-stream;
 log_format  detailed             '$remote_addr - $remote_user [$time_local] "$request" '
                                  '$status $body_bytes_sent "$http_referer" '
                                  '"$http_user_agent" "$http_x_forwarded_for" '
                                  '$ssl_server_name $upstream_addr $upstream_response_time';
 access_log                       /var/log/nginx/access.log  detailed;
 error_log                        /var/log/nginx/error.log   debug;
 sendfile                         on;
 keepalive_timeout                65;

 server {
  listen                          80;
  server_name                     relay.maleniti.com;
  server_tokens                   off;
  location ~ /.well-known/acme-challenge/(.*) {
   set $upstream                  http://161.97.149.206:80;
   proxy_pass                     $upstream/.well-known/acme-challenge/$1;
  }
  location / {
   return                         301 https://relay.maleniti.com$request_uri;
  }
 }
 server {
  listen                          80;
  server_name                     ln.maleniti.com;
  server_tokens                   off;
  location ~ /.well-known/acme-challenge/(.*) {
   resolver                       127.0.0.11;
   set $upstream                  http://certbot:80;
   proxy_pass                     $upstream/.well-known/acme-challenge/$1;
  }
  location / {
   return                         301 https://ln.maleniti.com$request_uri;
  }
 }
 server {
  listen                          80;
  server_name                     dnh.hr www.dnh.hr;
  server_tokens                   off;
  location ^~ /.well-known/acme-challenge/ {
   root         /var/www/certbot;
   default_type text/plain;
   add_header   Cache-Control "no-cache" always;
   try_files    $uri =404;
  }
  location / {
   return                         301 https://$host$request_uri;
  }
 }
 server {
  listen                          80;
  server_name                     maleniti.com www.maleniti.com;
  server_tokens                   off;
  location ~ /.well-known/acme-challenge/(.*) {
   resolver                       127.0.0.11;
   set $upstream                  http://certbot:80;
   proxy_pass                     $upstream/.well-known/acme-challenge/$1;
  }
  location / {
   return                         301 https://$host$request_uri;
  }
 }

 server {
  listen                          8443 ssl proxy_protocol;
  real_ip_header                  proxy_protocol;
  set_real_ip_from                127.0.0.1;
  server_name                     nakeddiaries.maleniti.com;
  ssl_certificate                 /etc/letsencrypt/live/maleniti.com/fullchain.pem;
  ssl_certificate_key             /etc/letsencrypt/live/maleniti.com/privkey.pem;
  include                         /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam                     /etc/letsencrypt/ssl-dhparams.pem;

  location / {
   proxy_pass                     http://nakeddiaries;
   proxy_set_header               Host $host;
   proxy_set_header               X-Real-IP $remote_addr;
   proxy_set_header               X-Forwarded-For $proxy_add_x_forwarded_for;
   proxy_set_header               X-Forwarded-Proto $scheme;
  }
 }
 server {
  listen                          8444 ssl proxy_protocol;
  real_ip_header                  proxy_protocol;
  set_real_ip_from                127.0.0.1;
  server_name                     blog.maleniti.com;
  ssl_certificate                 /etc/letsencrypt/live/maleniti.com/fullchain.pem;
  ssl_certificate_key             /etc/letsencrypt/live/maleniti.com/privkey.pem;
  include                         /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam                     /etc/letsencrypt/ssl-dhparams.pem;

  location / {
   proxy_pass                     http://blog;
   proxy_set_header               Host $host;
   proxy_set_header               X-Real-IP $remote_addr;
   proxy_set_header               X-Forwarded-For $proxy_add_x_forwarded_for;
   proxy_set_header               X-Forwarded-Proto $scheme;
  }
 }

 server {
  listen                          8445 ssl proxy_protocol;
  real_ip_header                  proxy_protocol;
  set_real_ip_from                127.0.0.1;
  server_name                     ln.maleniti.com;
  ssl_certificate                 /etc/letsencrypt/live/maleniti.com/fullchain.pem;
  ssl_certificate_key             /etc/letsencrypt/live/maleniti.com/privkey.pem;
  ssl_protocols                   TLSv1.2 TLSv1.3;
  ssl_ciphers                     HIGH:!aNULL:!MD5;

  location / {
   proxy_pass                     http://161.97.149.206:5000;
   proxy_set_header               Host $host;
   proxy_set_header               X-Real-IP $remote_addr;
   proxy_set_header               X-Forwarded-For $proxy_add_x_forwarded_for;
   proxy_set_header               X-Forwarded-Proto $scheme;
   proxy_set_header               Upgrade $http_upgrade;
   proxy_set_header               Connection "upgrade";
   proxy_connect_timeout          60s;
   proxy_send_timeout             60s;
   proxy_read_timeout             60s;
   send_timeout                   60s;
  }
 }

 server {
  listen                          8447 ssl proxy_protocol;
  real_ip_header                  proxy_protocol;
  set_real_ip_from                127.0.0.1;
  server_name                     dnh.hr www.dnh.hr;
  ssl_certificate                 /etc/letsencrypt/live/dnh.hr/fullchain.pem;
  ssl_certificate_key             /etc/letsencrypt/live/dnh.hr/privkey.pem;
  include                         /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam                     /etc/letsencrypt/ssl-dhparams.pem;

  location / {
   proxy_pass                     http://dnh;
   proxy_set_header               Host $host;
   proxy_set_header               X-Real-IP $remote_addr;
   proxy_set_header               X-Forwarded-For $remote_addr;
   proxy_set_header               X-Forwarded-Proto $scheme;
  }
 }

 server {
  listen                          8446 ssl proxy_protocol;
  real_ip_header                  proxy_protocol;
  set_real_ip_from                127.0.0.1;
  server_name                     maleniti.com www.maleniti.com;
  ssl_certificate                 /etc/letsencrypt/live/maleniti.com/fullchain.pem;
  ssl_certificate_key             /etc/letsencrypt/live/maleniti.com/privkey.pem;
  include                         /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam                     /etc/letsencrypt/ssl-dhparams.pem;

  location / {
   proxy_pass                     http://www;
   proxy_set_header               Host $host;
   proxy_set_header               X-Real-IP $remote_addr;
   proxy_set_header               X-Forwarded-For $proxy_add_x_forwarded_for;
   proxy_set_header               X-Forwarded-Proto $scheme;
  }
 }

 server {
  listen                          80 default_server;
  listen                          8446 ssl default_server;
  server_name                     _;
  ssl_certificate                 /etc/letsencrypt/live/maleniti.com/fullchain.pem;
  ssl_certificate_key             /etc/letsencrypt/live/maleniti.com/privkey.pem;

  return                          301 https://maleniti.com;
 }
}
